<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | Student Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2073&auto=format') no-repeat center center/cover;
            background-attachment: fixed;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }

        .error-container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            margin: 20px;
            text-align: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 50px 40px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
            line-height: 1;
        }

        .error-title {
            font-size: 1.8rem;
            color: white;
            margin: 20px 0 10px;
        }

        .error-message {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .home-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(76, 175, 80, 0.9);
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }

        .home-button:hover {
            background: rgba(76, 175, 80, 1);
            transform: translateY(-3px);
        }

        .fa-500 {
            font-size: 5rem;
            color: #f44336;
            margin-bottom: 20px;
        }

        .retry-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.2);
            padding: 12px 28px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            margin-left: 10px;
        }

        .retry-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 5rem;
            }
            .glass-card {
                padding: 30px 20px;
            }
            .retry-button {
                margin-left: 0;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="glass-card">
            <i class="fas fa-exclamation-triangle fa-500"></i>
            <div class="error-code">500</div>
            <h1 class="error-title">Internal Server Error</h1>
            <p class="error-message">Something went wrong on our end. Please try again later.</p>
            <div>
                <a href="/" class="home-button">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="javascript:location.reload()" class="retry-button">
                    <i class="fas fa-sync-alt"></i> Retry
                </a>
            </div>
        </div>
    </div>
</body>
</html>
