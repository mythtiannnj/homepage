<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Timeline | Events</title>
    <link rel="icon" href="https://iili.io/CC6nKHQ.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?q=80&w=2073&auto=format') no-repeat center center/cover;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070&auto=format') no-repeat center center/cover;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        body.dark-mode::before {
            background: rgba(0, 0, 0, 0.6);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-in {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode nav {
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .hamburger {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 5px;
            z-index: 1001;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background: white;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .hamburger.active div:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .hamburger.active div:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active div:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        nav img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.5);
            transition: border-color 0.3s ease;
        }

        body.dark-mode nav img {
            border-color: rgba(255, 255, 255, 0.3);
        }

        nav h6 {
            color: white;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        #theme-button {
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            transition: transform 0.3s, color 0.3s ease;
        }

        #theme-button:hover {
            transform: rotate(20deg);
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 300px;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease, background 0.3s ease;
            z-index: 999;
            padding: 20px;
            overflow-y: auto;
        }

        body.dark-mode .sidebar {
            background: rgba(0, 0, 0, 0.92);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .sidebar-header h2 {
            color: #4caf50;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.75rem;
        }

        .sidebar-menu {
            margin-bottom: 30px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        .menu-item:hover {
            background: rgba(76, 175, 80, 0.3);
            transform: translateX(5px);
        }

        .menu-item.active {
            background: rgba(76, 175, 80, 0.5);
        }

        .menu-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        .menu-text {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .menu-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 15px 0;
        }

        .events-title {
            color: white;
            font-size: 1rem;
            margin: 15px 0 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 5px;
        }

        .events-title i {
            color: #4caf50;
            font-size: 0.9rem;
        }

        .sidebar-event-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .sidebar-event-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .sidebar-event-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .sidebar-event-caption {
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        .sidebar-event-date, .sidebar-event-time {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-right: 10px;
        }

        .loading-events {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
        }

        .main-wrapper {
            position: relative;
            z-index: 1;
            margin-left: 0;
            transition: margin-left 0.3s ease;
            padding: 100px 20px 20px;
            min-height: 100vh;
        }

        .main-wrapper.shifted {
            margin-left: 300px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-bottom: 25px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode .glass-card {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        .section-title {
            color: white;
            font-size: 2rem;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: color 0.3s ease;
        }

        .section-title i {
            color: #4caf50;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: rgba(76, 175, 80, 0.6);
        }

        .event-item {
            position: relative;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        body.dark-mode .event-item {
            background: rgba(0, 0, 0, 0.3);
        }

        .event-item:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.25);
        }

        body.dark-mode .event-item:hover {
            background: rgba(0, 0, 0, 0.45);
        }

        .event-item::before {
            content: '';
            position: absolute;
            left: -27px;
            top: 30px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #4caf50;
            border: 2px solid white;
            z-index: 2;
        }

        /* SQUARE IMAGE - Fixed size */
        .event-img {
            flex: 0 0 180px;
            width: 180px;
            height: 180px;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
        }

        .event-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
        }

        .save-img-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .save-img-btn:hover {
            background: rgba(76, 175, 80, 0.9);
            transform: scale(1.05);
        }

        .save-img-btn i {
            font-size: 0.8rem;
        }

        .event-details {
            flex: 1;
            color: white;
            min-width: 200px;
        }

        .event-caption {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .event-date, .event-time {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            margin-right: 10px;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(76, 175, 80, 0.95);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 2000;
            backdrop-filter: blur(10px);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .toast-message.show {
            transform: translateX(0);
        }

        .toast-message.error {
            background: rgba(244, 67, 54, 0.95);
        }

        .loading {
            color: white;
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-top: 20px;
            transition: color 0.3s ease;
        }

        .footer i {
            color: #4caf50;
            margin: 0 4px;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
            display: none;
            transition: background 0.3s ease;
        }

        .overlay.active {
            display: block;
        }

        /* Theme transition animation class */
        .theme-changing {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (min-width: 769px) and (max-width: 1200px) {
            .container {
                max-width: 960px;
            }
            .event-img {
                flex: 0 0 160px;
                width: 160px;
                height: 160px;
            }
        }

        @media (max-width: 768px) {
            .main-wrapper.shifted {
                margin-left: 0;
            }
            .section-title {
                font-size: 1.5rem;
                justify-content: center;
            }
            nav h6 {
                display: none;
            }
            .sidebar {
                width: 280px;
                left: -280px;
            }
            .event-img {
                flex: 0 0 140px;
                width: 140px;
                height: 140px;
            }
            .event-item {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .event-details {
                text-align: center;
                min-width: 100%;
            }
        }

        @media (max-width: 600px) {
            .event-item {
                flex-direction: column;
                align-items: center;
            }
            .timeline {
                padding-left: 20px;
            }
            .section-title {
                font-size: 1.3rem;
            }
            .glass-card {
                padding: 20px;
            }
            .event-img {
                flex: 0 0 200px;
                width: 200px;
                height: 200px;
            }
            .toast-message {
                bottom: 20px;
                right: 20px;
                left: 20px;
                text-align: center;
                transform: translateY(100px);
            }
            .toast-message.show {
                transform: translateY(0);
            }
            .event-details {
                text-align: center;
            }
        }

        @media (max-width: 400px) {
            .event-img {
                flex: 0 0 160px;
                width: 160px;
                height: 160px;
            }
            .event-caption {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="navbar-left">
            <div class="hamburger" id="hamburger" onclick="toggleMenu()">
                <div></div>
                <div></div>
                <div></div>
            </div>
            <img src="https://iili.io/CC6nKHQ.jpg" alt="logo" id="navLogo">
            <h6 id="navTitle">Timeline</h6>
        </div>
        <i class="fas fa-moon" id="theme-button"></i>
    </nav>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <div class="subtitle">Student Profile Navigation</div>
        </div>
        <div class="sidebar-menu">
            <a href="/" class="menu-item">
                <i class="fas fa-home"></i>
                <span class="menu-text">HOME</span>
            </a>
            <a href="/info" class="menu-item">
                <i class="fas fa-user"></i>
                <span class="menu-text">INFO</span>
            </a>
            <a href="/timeline" class="menu-item active">
                <i class="fas fa-calendar-alt"></i>
                <span class="menu-text">TIMELINE</span>
            </a>
            <a href="/newsfeed" class="menu-item">
                <i class="fas fa-newspaper"></i>
                <span class="menu-text">NEWSFEED</span>
            </a>
            <a href="/bible" class="menu-item">
                <i class="fas fa-bible"></i>
                <span class="menu-text">BIBLE</span>
            </a>
        </div>
        <div class="menu-divider"></div>
        <div class="events-title">
            <i class="fas fa-calendar-week"></i>
            <span>Upcoming Events</span>
        </div>
        <div class="events-container" id="sidebarEvents">
            <div class="loading-events">
                <i class="fas fa-spinner fa-pulse"></i> Loading events...
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeMenu()"></div>

    <div class="main-wrapper" id="mainWrapper">
        <div class="container">
            <div class="glass-card fade-in" id="timelineCard">
                <div class="section-title">
                    <i class="fas fa-calendar-alt"></i>
                    <h2>Events Timeline</h2>
                </div>
                <div id="timelineContainer" class="timeline">
                    <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading events...</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <i class="fas fa-copyright"></i> 2026 All Rights Reserved. 
            <i class="fas fa-user-shield"></i> This page is managed by Web Admin
        </div>
    </div>

    <div id="toastMessage" class="toast-message">
        <i class="fas fa-check-circle"></i> Image saved successfully!
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const hamburger = document.getElementById('hamburger');
            const mainWrapper = document.getElementById('mainWrapper');

            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            hamburger.classList.toggle('active');

            if (window.innerWidth > 768) {
                mainWrapper.classList.toggle('shifted');
            }
        }

        function closeMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            const hamburger = document.getElementById('hamburger');
            const mainWrapper = document.getElementById('mainWrapper');

            sidebar.classList.remove('active');
            overlay.classList.remove('active');
            hamburger.classList.remove('active');
            mainWrapper.classList.remove('shifted');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function showToast(message, isError) {
            const toast = document.getElementById('toastMessage');
            toast.innerHTML = (isError ? '<i class="fas fa-exclamation-triangle"></i> ' : '<i class="fas fa-check-circle"></i> ') + message;
            toast.classList.add('show');
            if (isError) {
                toast.classList.add('error');
            } else {
                toast.classList.remove('error');
            }
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }

        async function saveImage(imageUrl, eventName) {
            try {
                const response = await fetch(imageUrl);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                const link = document.createElement('a');
                link.href = blobUrl;
                const safeName = eventName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
                link.download = `event_${safeName}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(blobUrl);

                showToast(`Image saved: ${eventName}`, false);
            } catch (error) {
                console.error('Save failed:', error);
                showToast('Failed to save image. Try right-click + Save As', true);
            }
        }

        function handleScrollAnimation() {
            const elements = document.querySelectorAll('.fade-in');
            for (let i = 0; i < elements.length; i++) {
                const el = elements[i];
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight - 100) {
                    el.classList.add('visible');
                }
            }
        }

        async function loadEvents() {
            try {
                const response = await fetch('/api/events');
                if (!response.ok) throw new Error('Failed to fetch');
                const events = await response.json();

                const container = document.getElementById('timelineContainer');
                const sidebarContainer = document.getElementById('sidebarEvents');

                if (!events || events.length === 0) {
                    container.innerHTML = '<div class="loading">No events found.</div>';
                    if (sidebarContainer) sidebarContainer.innerHTML = '<div class="loading-events">No upcoming events.</div>';
                    return;
                }

                let timelineHtml = '';
                let sidebarHtml = '';

                for (let i = 0; i < events.length; i++) {
                    const event = events[i];
                    const eventId = 'event_' + i + '_' + Date.now();
                    timelineHtml += `
                        <div class="event-item">
                            <div class="event-img">
                                <img src="${event.imgurl}" alt="${escapeHtml(event.caption)}" id="img_${eventId}" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                                <button class="save-img-btn" onclick="saveImage('${event.imgurl}', '${escapeHtml(event.caption)}')">
                                    <i class="fas fa-download"></i> Save Image
                                </button>
                            </div>
                            <div class="event-details">
                                <div class="event-caption">${escapeHtml(event.caption)}</div>
                                <div class="event-date"><i class="fas fa-calendar-day"></i> ${escapeHtml(event.date)}</div>
                                <div class="event-time"><i class="fas fa-clock"></i> ${escapeHtml(event.time)}</div>
                            </div>
                        </div>
                    `;
                    sidebarHtml += `
                        <div class="sidebar-event-item">
                            <img src="${event.imgurl}" alt="${escapeHtml(event.caption)}" class="sidebar-event-img" onerror="this.src='https://via.placeholder.com/300x100?text=No+Image'">
                            <div class="sidebar-event-caption">${escapeHtml(event.caption)}</div>
                            <div class="sidebar-event-date"><i class="fas fa-calendar-day"></i> ${escapeHtml(event.date)}</div>
                            <div class="sidebar-event-time"><i class="fas fa-clock"></i> ${escapeHtml(event.time)}</div>
                        </div>
                    `;
                }

                container.innerHTML = timelineHtml;
                if (sidebarContainer) {
                    sidebarContainer.innerHTML = sidebarHtml;
                }

                handleScrollAnimation();
            } catch (error) {
                document.getElementById('timelineContainer').innerHTML = '<div class="loading">Error loading events.</div>';
                console.error(error);
            }
        }

        // Smooth Theme Toggle Function
        function toggleTheme() {
            const themeButton = document.getElementById('theme-button');
            const isDark = document.body.classList.contains('dark-mode');

            document.body.classList.add('theme-changing');

            if (isDark) {
                document.body.classList.remove('dark-mode');
                themeButton.className = 'fas fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.add('dark-mode');
                themeButton.className = 'fas fa-sun';
                localStorage.setItem('theme', 'dark');
            }

            setTimeout(() => {
                document.body.classList.remove('theme-changing');
            }, 400);
        }

        // Theme toggle with smooth transition
        const themeButton = document.getElementById('theme-button');
        const savedTheme = localStorage.getItem('theme');

        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeButton.className = 'fas fa-sun';
        } else {
            document.body.classList.remove('dark-mode');
            themeButton.className = 'fas fa-moon';
        }

        themeButton.addEventListener('click', toggleTheme);

        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const hamburger = document.getElementById('hamburger');

            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(event.target) && !hamburger.contains(event.target)) {
                    closeMenu();
                }
            }
        });

        window.addEventListener('scroll', handleScrollAnimation);
        window.addEventListener('load', () => {
            loadEvents();
            handleScrollAnimation();
        });
    </script>
</body>
</html>
